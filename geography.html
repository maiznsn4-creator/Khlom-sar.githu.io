<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>មុខវិជ្ជាប្រឡង - ឆាប់ៗនេះ</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e5ec 0%, #f1f3f6 100%);
            --white: #ffffff;
            --shadow: #b8c4d6;
            --accent: #0088cc;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background: var(--bg-gradient); min-height: 100vh;
            padding: 20px 15px; display: flex; justify-content: center; align-items: center; color: #3d4852;
        }

        .container {
            width: 100%; max-width: 440px; text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        /* ផ្ទាំងកាត Soon ស្ទីល Glassmorphism លាយ Neumorphism */
        .soon-card {
            background: rgba(255, 255, 255, 0.65); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
            border-radius: 28px; padding: 40px 20px;
            box-shadow: 9px 9px 20px var(--shadow), -9px -9px 20px var(--white);
            border: 1px solid rgba(255, 255, 255, 0.8); margin-bottom: 25px;
        }

        .icon-zone {
            width: 90px; height: 90px; background: var(--bg-gradient); border-radius: 50%; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--white), inset 2px 2px 5px var(--white);
        }

        .icon-zone i {
            font-size: 38px; color: #f39c12;
            animation: rotateHourglass 2.5s infinite linear;
        }

        h1.title {
            font-family: 'Moul'; font-size: 16px; color: var(--accent); line-height: 1.8; margin-bottom: 8px;
        }

        .status-badge {
            background: #fbf5e6; color: #d35400; padding: 6px 16px; border-radius: 50px;
            font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid rgba(243, 156, 18, 0.2); margin-bottom: 20px;
        }

        /* ផ្នែកបង្ហាញព័ត៌មានសិស្សដែលទទួលបានពី index.html */
        .user-verify-box {
            background: rgba(255, 255, 255, 0.45); border-radius: 16px; padding: 12px 15px;
            font-size: 11px; text-align: left; line-height: 1.8; color: #555;
            border: 1px solid rgba(255,255,255,0.6); box-shadow: inset 2px 2px 5px var(--shadow);
        }
        .user-verify-box b { color: #111; }

        /* ប៊ូតុងត្រឡប់ក្រោយ Neumorphism */
        .back-btn {
            background: var(--bg-gradient); border: none; border-radius: 18px;
            box-shadow: 5px 5px 12px var(--shadow), -5px -5px 12px var(--white);
            padding: 14px 24px; font-size: 13px; font-weight: 700; color: #5a6578;
            cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.2s ease; text-decoration: none; width: 100%; justify-content: center;
        }
        
        .back-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow), inset -3px -3px 6px var(--white);
            transform: scale(0.98);
        }

        /* Animations */
        @keyframes rotateHourglass {
            0% { transform: rotate(0deg); }
            45% { transform: rotate(0deg); }
            55% { transform: rotate(180deg); }
            100% { transform: rotate(180deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="soon-card">
        <div class="icon-zone">
            <i class="fas fa-hourglass-half"></i>
        </div>
        
        <h1 class="title">វិញ្ញាសាមិនទាន់បើកទ្វារ</h1>
        
        <div class="status-badge">
            <i class="fas fa-tools"></i> នឹងមកដល់ឆាប់ៗនេះ (Coming Soon)
        </div>

        <!-- បង្ហាញដើម្បីបញ្ជាក់ថាទំព័រនេះនៅតែស្គាល់អត្តសញ្ញាណសិស្ស -->
        <div class="user-verify-box">
            👤 ឈ្មោះបេក្ខជន៖ <b id="user-name">កំពុងពិនិត្យ...</b><br>
            🆔 អត្តសញ្ញាណ ID៖ <b id="user-id">កំពុងពិនិត្យ...</b>
        </div>
    </div>

    <!-- ប៊ូតុងត្រឡប់ទៅទំព័រដើមវិញ -->
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> ត្រឡប់ទៅទំព័រដើម
    </button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    // ១. ចាប់យកទិន្នន័យ (URL Parameters) ដែលបាញ់ចេញពី index.html
    const urlParams = new URLSearchParams(window.location.search);
    const u_id = urlParams.get('id') || "មិនស្គាល់";
    const u_name = urlParams.get('name') || "សិស្សក្រៅប្រព័ន្ធ";

    // បង្ហាញព័ត៌មានលើអេក្រង់
    document.getElementById('user-id').innerText = u_id;
    document.getElementById('user-name').innerText = u_name;

    // ២. មុខងារត្រឡប់ទៅទំព័រដើមវិញដោយរក្សាទុកទិន្នន័យដដែល
    function goBack() {
        tg.HapticFeedback.impactOccurred('light'); // ញ័រទូរសព្ទតិចៗពេលចុច Back
        window.location.href = "index.html";
    }
</script>
</body>
</html>
